<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #111827;
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    header {
      background: #1f2937;
      padding: 20px;
      font-size: 24px;
    }

    .section {
      padding: 40px;
    }

    .btn {
      background: #3b82f6;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin: 10px;
    }

    #projectsList {
      display: none;
    }

    footer {
      background: #1f2937;
      padding: 15px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }
  </style>
</head>

<body>

<header>
  My Portfolio Website
  <br>
  <button class="btn" onclick="toggleTheme()">Toggle Theme</button>
</header>

<div class="section">
  <h2>About Me</h2>
  <p>I am Shiviya Arora.<br>
A beginner web developer learning HTML, CSS, and JavaScript.</p>
</div>

<div class="section">
  <h2>Projects</h2>
  <button class="btn" onclick="showProjects()">View Projects</button>

  <div id="projectsList">
    <p>✔ Tic Tac Toe Game</p>
    <p>✔ Calculator</p>
    <p>✔ Portfolio Website</p>
  </div>
</div>

<div class="section">
  <h2>Contact Me</h2>
  <input type="text" id="name" placeholder="Enter your name"><br>
  <button class="btn" onclick="submitForm()">Submit</button>
</div>

<footer>Shiviya Arora | © 2026 My Portfolio</footer>

<script>
  function showProjects() {
    let list = document.getElementById("projectsList");
    list.style.display = list.style.display === "none" ? "block" : "none";
  }

  function submitForm() {
    let name = document.getElementById("name").value;
    if (name === "") {
      alert("Please enter your name!");
    } else {
      alert("Thank you, " + name + "!");
    }
  }

  function toggleTheme() {
    let body = document.body;
    if (body.style.background === "white") {
      body.style.background = "#111827";
      body.style.color = "white";
    } else {
      body.style.background = "white";
      body.style.color = "black";
    }
  }
</script>

</body>
</html>
